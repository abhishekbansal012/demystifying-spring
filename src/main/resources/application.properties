spring.application.name=demystifying-spring

# Configuration module demo properties
app.name=demystifying-spring
app.version=1.0.0
app.description=Spring Framework concepts demonstrated through working code

# Feature flags for @ConditionalOnProperty demo
app.feature.x.enabled=true
# app.feature.y.enabled is intentionally missing (matchIfMissing=true kicks in)

# Relaxed binding demo
app.relaxed-binding.kebab-case-value=from-kebab
app.relaxed-binding.camelCaseValue=from-camel
app.relaxed-binding.UPPER_CASE_VALUE=from-upper
